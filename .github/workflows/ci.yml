name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_TERM_PROGRESS_WHEN: always
  CARGO_TERM_PROGRESS_WIDTH: 80

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - name: Install taplo
        uses: taiki-e/install-action@taplo-cli

      - name: Check Rust formatting
        run: cargo +nightly fmt -- --check

      - name: Check TOML formatting
        run: taplo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rust-src, rustc-dev, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --all-targets

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src, rustc-dev, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

  install-check:
    name: Linux Install Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src, rustc-dev, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-vischeck
        run: cargo install --path . --root /tmp/cargo-vischeck-install

      - name: Check installed binary
        run: /tmp/cargo-vischeck-install/bin/cargo-vischeck --help

      - name: Check cargo subcommand wiring
        run: PATH="/tmp/cargo-vischeck-install/bin:$PATH" cargo vischeck --help

  windows-install-check:
    name: Windows Install Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src, rustc-dev, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-vischeck
        shell: pwsh
        run: cargo install --path . --debug --root "$env:RUNNER_TEMP\\cargo-vischeck-install"

      - name: Check installed binary
        shell: pwsh
        run: |
          $sysroot = rustc --print sysroot
          $rustHostTriple = (rustc -vV | Select-String '^host: ').ToString().Split(' ')[1]
          $toolchainBin = Join-Path $sysroot 'bin'
          $rustlibBin = Join-Path $sysroot "lib\rustlib\$rustHostTriple\bin"
          $rustlibLib = Join-Path $sysroot "lib\rustlib\$rustHostTriple\lib"
          $env:PATH = "$toolchainBin;$rustlibBin;$rustlibLib;$env:PATH"
          & "$env:RUNNER_TEMP\cargo-vischeck-install\bin\cargo-vischeck.exe" --help

      - name: Check cargo subcommand wiring
        shell: pwsh
        run: |
          $sysroot = rustc --print sysroot
          $rustHostTriple = (rustc -vV | Select-String '^host: ').ToString().Split(' ')[1]
          $toolchainBin = Join-Path $sysroot 'bin'
          $rustlibBin = Join-Path $sysroot "lib\rustlib\$rustHostTriple\bin"
          $rustlibLib = Join-Path $sysroot "lib\rustlib\$rustHostTriple\lib"
          $env:PATH = "$toolchainBin;$rustlibBin;$rustlibLib;$env:PATH"
          $env:PATH = "$env:RUNNER_TEMP\cargo-vischeck-install\bin;$env:PATH"
          cargo vischeck --help

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src, rustc-dev, llvm-tools-preview

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo nextest run

  self-check:
    name: Self Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rust-src, rustc-dev, llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run vischeck on itself
        run: cargo run -- --fail-on-warn
